services:
  portfolio:
    build: .
    container_name: new-portfolio
    restart: always
    environment:
      CERTBOT_EMAIL: aceleagueoflegends@gmail.com
      NGINX_SERVER_NAME: ace-perez-portfolio.dev
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx_secrets:/etc/letsencrypt
      - nginx_certbot_www:/var/www/certbot
    depends_on:
      - api
    networks:
      - portfolio_net

  api:
    build: ./api
    container_name: portfolio-api
    restart: always
    env_file:
      - ./api/.env
    volumes:
      - blog_data:/app/data
    expose:
      - "3001"
    networks:
      - portfolio_net

networks:
  portfolio_net:
    driver: bridge

volumes:
  nginx_secrets:
  nginx_certbot_www:
  blog_data:
