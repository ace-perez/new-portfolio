services:
  portfolio:
    build: .
    container_name: new-portfolio
    restart: always
    environment:
      CERTBOT_EMAIL: aceleagueoflegends@gmail.com
      NGINX_SERVER_NAME: ace-perez-portfolio.dev
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx_secrets:/etc/letsencrypt
      - nginx_certbot_www:/var/www/certbot
    depends_on:
      - api
    networks:
      - portfolio_net

  api:
    build: ./api
    container_name: portfolio-api
    restart: always
    env_file:
      - ./api/.env
    volumes:
      - blog_data:/app/data
    expose:
      - "3001"
    networks:
      - portfolio_net

  newrelic-infra:
    image: newrelic/infrastructure:latest
    container_name: newrelic-infra
    restart: unless-stopped
    cap_add:
      - SYS_PTRACE
    network_mode: host
    pid: host
    privileged: true
    volumes:
      - /:/host:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./newrelic-integrations:/etc/newrelic-infra/integrations.d
    environment:
      NRIA_LICENSE_KEY: ${NEW_RELIC_LICENSE_KEY}
      NRIA_DISPLAY_NAME: "ace-perez-portfolio-ec2"

networks:
  portfolio_net:
    driver: bridge

volumes:
  nginx_secrets:
  nginx_certbot_www:
  blog_data:
