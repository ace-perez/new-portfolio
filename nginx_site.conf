server {
    listen 443 ssl;
    server_name ace-perez-portfolio.dev www.ace-perez-portfolio.dev;

    ssl_certificate     /etc/letsencrypt/live/ace-perez-portfolio.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ace-perez-portfolio.dev/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/ace-perez-portfolio.dev/chain.pem;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache Vite-hashed static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1000;
}
